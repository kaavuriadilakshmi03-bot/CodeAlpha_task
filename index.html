<!DOCTYPE html>
<html>
<head>
    <title>Hangman Game</title>
</head>
<body>

    <h1>Hangman Game</h1>

    <p id="word"></p>

    <input type="text" id="letter" maxlength="1" placeholder="Enter a letter">
    <button onclick="guessLetter()">Guess</button>

    <p id="message"></p>
    <p id="attempts"></p>

    <script>
        const word = "PYTHON";
        let guessedWord = ["_", "_", "_", "_", "_", "_"];
        let attempts = 6;

        document.getElementById("word").innerHTML = guessedWord.join(" ");

        function guessLetter() {
            let letter = document.getElementById("letter").value.toUpperCase();
            let found = false;

            for (let i = 0; i < word.length; i++) {
                if (word[i] === letter) {
                    guessedWord[i] = letter;
                    found = true;
                }
            }

            if (!found) {
                attempts--;
            }

            document.getElementById("word").innerHTML = guessedWord.join(" ");
            document.getElementById("attempts").innerHTML =
                "Remaining Attempts: " + attempts;

            if (guessedWord.join("") === word) {
                document.getElementById("message").innerHTML =
                    "🎉 Congratulations! You Won!";
            }

            if (attempts === 0) {
                document.getElementById("message").innerHTML =
                    "❌ Game Over! The word was " + word;
            }

            document.getElementById("letter").value = "";
        }
    </script>

</body>
</html>
